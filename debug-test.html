<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug QR Scanner</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: white;
            font-family: monospace;
        }

        #video {
            width: 100%;
            max-width: 640px;
            border: 2px solid #00ff00;
        }

        #logs {
            margin-top: 20px;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
        }

        .log-entry {
            margin: 2px 0;
            padding: 2px 5px;
        }

        .log-info {
            color: #00ff00;
        }

        .log-error {
            color: #ff0000;
        }

        .log-warn {
            color: #ffaa00;
        }
    </style>
</head>

<body>
    <h1>🔍 QR Scanner Debug Test</h1>
    <video id="video" autoplay playsinline muted></video>
    <div style="margin-top: 10px; font-family: sans-serif;">
        <label>
            <input type="checkbox" id="showTextToggle" checked>
            Log Barcode Text
        </label>
    </div>
    <div id="logs"></div>

    <script type="module">
        import {
            getDefaultScanner,
            scanImageData,
            setModuleArgs,
            ZBarConfigType,
            ZBarSymbolType
        } from '@undecaf/zbar-wasm';
        import zbarWasmUrl from '@undecaf/zbar-wasm/dist/zbar.wasm?url';

        const logsDiv = document.getElementById('logs');
        const video = document.getElementById('video');
        const showTextToggle = document.getElementById('showTextToggle');
        const frameCanvas = document.createElement('canvas');
        const frameContext = frameCanvas.getContext('2d', { willReadFrequently: true });

        setModuleArgs({
            locateFile: (filename, directory) =>
                filename === 'zbar.wasm' ? zbarWasmUrl : `${directory}${filename}`,
        });

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(message);
        }

        // Override console methods to capture logs
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        console.log = (...args) => {
            originalLog(...args);
            log(args.join(' '), 'info');
        };

        console.error = (...args) => {
            originalError(...args);
            log(args.join(' '), 'error');
        };

        console.warn = (...args) => {
            originalWarn(...args);
            log(args.join(' '), 'warn');
        };

        async function createLocalDetector() {
            if (!frameContext) {
                throw new Error('Canvas 2D context is unavailable');
            }

            const scanner = await getDefaultScanner();
            scanner.setConfig(ZBarSymbolType.ZBAR_NONE, ZBarConfigType.ZBAR_CFG_ENABLE, 0);
            scanner.setConfig(ZBarSymbolType.ZBAR_QRCODE, ZBarConfigType.ZBAR_CFG_ENABLE, 1);

            return {
                async detect(videoElement) {
                    if (frameCanvas.width !== videoElement.videoWidth || frameCanvas.height !== videoElement.videoHeight) {
                        frameCanvas.width = videoElement.videoWidth;
                        frameCanvas.height = videoElement.videoHeight;
                    }

                    frameContext.drawImage(videoElement, 0, 0, frameCanvas.width, frameCanvas.height);
                    const imageData = frameContext.getImageData(0, 0, frameCanvas.width, frameCanvas.height);
                    const symbols = await scanImageData(imageData, scanner);

                    return symbols.map(symbol => ({
                        rawValue: symbol.decode('utf-8')
                    }));
                }
            };
        }

        async function testCamera() {
            try {
                log('🎬 Starting camera test...');

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                log('✅ Camera stream obtained: ' + stream.getVideoTracks()[0].label);

                video.srcObject = stream;
                log('🎥 Video srcObject set');

                video.onloadedmetadata = () => {
                    log(`📹 Video metadata loaded: ${video.videoWidth}x${video.videoHeight}`);
                };

                video.onplay = () => {
                    log('▶️ Video is playing');
                };

                await video.play();
                log('✅ Video play() called successfully');

                // Test BarcodeDetector
                log('🔍 Testing BarcodeDetector...');

                if ('BarcodeDetector' in window) {
                    log('✅ Native BarcodeDetector available');
                    const detector = new BarcodeDetector({ formats: ['qr_code'] });
                    log('✅ BarcodeDetector instance created');

                    // Start detection loop
                    let frameCount = 0;
                    const detect = async () => {
                        if (video.readyState >= 2 && video.videoWidth > 0) {
                            frameCount++;
                            if (frameCount === 1) {
                                log(`🎬 First detection frame: ${video.videoWidth}x${video.videoHeight}, readyState: ${video.readyState}`);
                            }

                            try {
                                const barcodes = await detector.detect(video);
                                if (barcodes.length > 0) {
                                    if (showTextToggle.checked) {
                                        log('🎯 QR Codes detected: ' + barcodes.map(b => b.rawValue).join(', '));
                                    } else {
                                        log(`🎯 ${barcodes.length} QR Code(s) detected (text hidden)`);
                                    }
                                }
                            } catch (err) {
                                log('❌ Detection error: ' + err.message, 'error');
                            }
                        } else if (frameCount % 60 === 0) {
                            log(`⏳ Waiting for video... readyState: ${video.readyState}, size: ${video.videoWidth}x${video.videoHeight}`);
                        }

                        requestAnimationFrame(detect);
                    };

                    requestAnimationFrame(detect);
                } else {
                    log('⚠️ Native BarcodeDetector NOT available - using local WASM detector', 'warn');
                    const detector = await createLocalDetector();
                    log('✅ Local WASM detector instance created');

                    // Start detection loop
                    let frameCount = 0;
                    const detect = async () => {
                        if (video.readyState >= 2 && video.videoWidth > 0) {
                            frameCount++;
                            if (frameCount === 1) {
                                log(`🎬 First detection frame: ${video.videoWidth}x${video.videoHeight}, readyState: ${video.readyState}`);
                            }

                            try {
                                const barcodes = await detector.detect(video);
                                if (barcodes.length > 0) {
                                    if (showTextToggle.checked) {
                                        log('🎯 QR Codes detected: ' + barcodes.map(b => b.rawValue).join(', '));
                                    } else {
                                        log(`🎯 ${barcodes.length} QR Code(s) detected (text hidden)`);
                                    }
                                }
                            } catch (err) {
                                log('❌ Detection error: ' + err.message, 'error');
                            }
                        } else if (frameCount % 60 === 0) {
                            log(`⏳ Waiting for video... readyState: ${video.readyState}, size: ${video.videoWidth}x${video.videoHeight}`);
                        }

                        requestAnimationFrame(detect);
                    };

                    requestAnimationFrame(detect);
                }

            } catch (err) {
                log('❌ Camera error: ' + err.message, 'error');
                log('Stack: ' + err.stack, 'error');
            }
        }

        // Start test
        testCamera();
    </script>
</body>

</html>
